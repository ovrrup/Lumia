name: Build APK (Technical Version)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Remove invalid macOS Icon files
      run: find app/src/main/res -type f -name "Icon*" -delete

    - name: Setup Signing Key
      run: |
        if [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
          echo "Decoding release keystore from secrets..."
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > my-upload-key.jks
        elif [ -f "debug.keystore.base64" ]; then
          echo "Using persistent debug keystore for development build..."
          base64 --decode debug.keystore.base64 > my-upload-key.jks
        else
          echo "Generating development release keystore..."
          keytool -genkey -v -keystore my-upload-key.jks -storepass android -alias upload -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Lumia Release"
        fi

    - name: Build Release APKs
      run: gradle assembleRelease assembleReleaseCompressed --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" -Dkotlin.compiler.execution.strategy=in-process --no-parallel
      env:
        JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
        STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'android' }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'android' }}

    - name: Reorganize and Rename APKs
      run: |
        # Process standard release APKs (Uncompressed)
        cd app/build/outputs/apk/release/
        echo "Listing initial release APKs:"
        ls -la
        for file in *.apk; do
          if [ -f "$file" ]; then
            new_name=$(echo "$file" | sed -e 's/^app/Lumia/' -e 's/-release/-technical/')
            mv "$file" "$new_name"
            echo "Renamed $file to $new_name"
          fi
        done
        if [ -f "Lumia-universal-technical.apk" ]; then
          cp Lumia-universal-technical.apk Lumia-technical.apk
          echo "Copied Lumia-universal-technical.apk to Lumia-technical.apk"
        fi
        
        # Process compressed release APKs
        cd ../releaseCompressed/
        echo "Listing initial compressed release APKs:"
        ls -la
        if [ -f "app-releaseCompressed-universal.apk" ]; then
          cp app-releaseCompressed-universal.apk ../release/Lumia-universal-compressed-technical.apk
          echo "Copied universal compressed APK to release folder"
        fi
        
        cd ../release/
        echo "Listing reorganized release APKs:"
        ls -la

    - name: Upload APKs to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Lumia-Technical-Release-APKs
        path: |
          app/build/outputs/apk/release/Lumia*.apk
