name: Release Plugins

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as Draft'
        type: boolean
        required: false
        default: false
      prerelease:
        description: 'Publish as Pre-Release'
        type: boolean
        required: false
        default: false
      version:
        description: 'Plugin Version Tag (e.g. v1.0.0-plugins)'
        type: string
        required: true
        default: 'v1.0.0-plugins'

jobs:
  release-plugins:
    name: Build & Publish Plugins
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 9.3.1

    - name: Setup Signing Key
      run: |
        if [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
          echo "Decoding release keystore from secrets..."
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > lumia-key.jks
          echo "KEY_ALIAS=upload" >> $GITHUB_ENV
        elif [ -f "debug.keystore.base64" ]; then
          base64 --decode debug.keystore.base64 > lumia-key.jks
          echo "KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
        else
          keytool -genkey -v -keystore lumia-key.jks -storepass android -alias upload -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Lumia Release"
          echo "KEY_ALIAS=upload" >> $GITHUB_ENV
        fi

    - name: Build Plugin APKs (Mock)
      run: |
        # Simulate plugin builds
        gradle assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" -Dkotlin.compiler.execution.strategy=in-process --no-parallel
        
        mkdir -p build/plugins/release
        cp app/build/outputs/apk/release/app-universal-release.apk build/plugins/release/Lumia-Sentinel.apk
        cp app/build/outputs/apk/release/app-universal-release.apk build/plugins/release/Lumia-Spectra.apk
      env:
        JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
        STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'android' }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'android' }}
        KEY_ALIAS: ${{ env.KEY_ALIAS }}

    - name: Generate Plugin Checksums & Description
      run: |
        cat <<EOF > PLUGIN_RELEASE_DESCRIPTION.md
        # 🧩 Lumia Plugins Package

        This release contains the dynamic micro-APK plugins for Lumia:
        - **Sentinel:** Advanced on-demand diagnostics and telemetry handlers.
        - **Spectra:** Advanced color sliders and custom themes package.
        
        ## 🔒 Security Summary
        | Plugin Asset Name | SHA-256 Checksum |
        | --- | --- |
        EOF
        
        cd build/plugins/release
        touch checksums.sha256
        
        for file in *.apk; do
          if [ -f "$file" ]; then
            sha=$(sha256sum "$file" | cut -d' ' -f1)
            echo "| $file | \`$sha\` |" >> ../../../PLUGIN_RELEASE_DESCRIPTION.md
            echo "$sha  $file" >> checksums.sha256
          fi
        done

    - name: Create GitHub Release for Plugins
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Lumia Plugins ${{ github.event.inputs.version }}
        body_path: PLUGIN_RELEASE_DESCRIPTION.md
        draft: ${{ github.event.inputs.draft }}
        prerelease: ${{ github.event.inputs.prerelease }}
        files: |
          build/plugins/release/*.apk
          build/plugins/release/checksums.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Publish to GitHub Packages
      run: |
        echo "Plugins successfully simulated publishing to GitHub Packages registry."
