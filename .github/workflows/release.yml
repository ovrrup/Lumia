name: Manual Release Publisher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g., v1.4.0). If empty, auto-detects from app-config.properties'
        required: false
        default: ''
      release_title:
        description: 'Release Title. If empty, uses "Lumia <tag>"'
        required: false
        default: ''
      draft:
        description: 'Publish as Draft'
        type: boolean
        required: false
        default: false
      prerelease:
        description: 'Publish as Pre-Release'
        type: boolean
        required: false
        default: false
  release:
    types: [published]

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Resolve Release Variables
      id: vars
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          TAG_NAME="${{ github.event.release.tag_name }}"
          RELEASE_TITLE="${{ github.event.release.name }}"
          if [ -z "$RELEASE_TITLE" ]; then
            RELEASE_TITLE="Lumia $TAG_NAME"
          fi
          IS_DRAFT="${{ github.event.release.draft }}"
          # Explicitly make sure the flags map to true/false string
          if [ "$IS_DRAFT" = "true" ]; then IS_DRAFT_STR="true"; else IS_DRAFT_STR="false"; fi
          
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          if [ "$IS_PRERELEASE" = "true" ]; then IS_PRERELEASE_STR="true"; else IS_PRERELEASE_STR="false"; fi
        elif [ "${{ github.event_name }}" = "push" ]; then
          # Pushed tag like v1.0.0
          TAG_NAME="${{ github.ref_name }}"
          RELEASE_TITLE="Lumia $TAG_NAME"
          IS_DRAFT_STR="false"
          IS_PRERELEASE_STR="false"
        else
          # Manual workflow dispatch
          INPUT_TAG="${{ github.event.inputs.tag_name }}"
          if [ -z "$INPUT_TAG" ]; then
            # Parse version from app-config.properties
            VERSION_NAME=$(grep "VERSION_NAME=" app/app-config.properties | cut -d'=' -f2 | tr -d '\r' | xargs)
            TAG_NAME="v$VERSION_NAME"
          else
            TAG_NAME="$INPUT_TAG"
          fi
          
          INPUT_TITLE="${{ github.event.inputs.release_title }}"
          if [ -z "$INPUT_TITLE" ]; then
            RELEASE_TITLE="Lumia $TAG_NAME"
          else
            RELEASE_TITLE="$INPUT_TITLE"
          fi
          
          if [ "${{ github.event.inputs.draft }}" = "true" ]; then IS_DRAFT_STR="true"; else IS_DRAFT_STR="false"; fi
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then IS_PRERELEASE_STR="true"; else IS_PRERELEASE_STR="false"; fi
        fi
        
        echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
        echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
        echo "IS_DRAFT=$IS_DRAFT_STR" >> $GITHUB_ENV
        echo "IS_PRERELEASE=$IS_PRERELEASE_STR" >> $GITHUB_ENV
        
        echo "Resolved Tag: $TAG_NAME"
        echo "Resolved Title: $RELEASE_TITLE"
        echo "Resolved Draft: $IS_DRAFT_STR"
        echo "Resolved Pre-Release: $IS_PRERELEASE_STR"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Remove invalid macOS Icon files
      run: find app/src/main/res -type f -name "Icon*" -delete

    - name: Setup Signing Key
      run: |
        if [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
          echo "Decoding release keystore from secrets..."
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > my-upload-key.jks
        else
          echo "Generating development release keystore..."
          keytool -genkey -v -keystore my-upload-key.jks -storepass android -alias upload -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Release"
        fi

    - name: Build Release APKs
      run: gradle assembleRelease
      env:
        STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'android' }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'android' }}

    - name: Reorganize and Rename APKs
      run: |
        cd app/build/outputs/apk/release/
        echo "Listing initial release APKs:"
        ls -la
        for file in *.apk; do
          if [ -f "$file" ]; then
            # Replace prefix 'app' with 'Lumia' and suffix '-release' with empty
            new_name=$(echo "$file" | sed -e 's/^app/Lumia/' -e 's/-release//')
            mv "$file" "$new_name"
            echo "Renamed $file to $new_name"
          fi
        done
        if [ -f "Lumia-universal.apk" ]; then
          cp Lumia-universal.apk Lumia.apk
          echo "Copied Lumia-universal.apk to Lumia.apk"
        fi
        echo "Listing reorganized release APKs:"
        ls -la

    - name: Read Release Notes Path
      id: release_notes
      run: |
        if [ -f "RELEASE_NOTES.md" ]; then
          echo "notes_path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
        else
          # Fallback if file doesn't exist
          echo "notes_path=" >> "$GITHUB_OUTPUT"
        fi

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.RELEASE_TITLE }}
        body_path: ${{ steps.release_notes.outputs.notes_path }}
        draft: ${{ env.IS_DRAFT }}
        prerelease: ${{ env.IS_PRERELEASE }}
        files: |
          app/build/outputs/apk/release/Lumia*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
