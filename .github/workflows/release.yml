name: Manual Release Publisher

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g., v1.4.0)'
        required: true
        default: 'v1.4.0'
      release_title:
        description: 'Release Title (e.g., Lumia v1.4.0)'
        required: true
        default: 'Lumia v1.4.0'
      draft:
        description: 'Publish as Draft'
        type: boolean
        required: false
        default: false
      prerelease:
        description: 'Publish as Pre-Release'
        type: boolean
        required: false
        default: false

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Remove invalid macOS Icon files
      run: find app/src/main/res -type f -name "Icon*" -delete

    - name: Setup Signing Key
      run: |
        if [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
          echo "Decoding release keystore from secrets..."
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > my-upload-key.jks
        else
          echo "Generating development release keystore..."
          keytool -genkey -v -keystore my-upload-key.jks -storepass android -alias upload -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Release"
        fi

    - name: Build Release APKs
      run: gradle assembleRelease
      env:
        STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'android' }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'android' }}

    - name: Reorganize and Rename APKs
      run: |
        cd app/build/outputs/apk/release/
        echo "Listing initial release APKs:"
        ls -la
        for file in *.apk; do
          if [ -f "$file" ]; then
            # Replace prefix 'app' with 'Lumia' and suffix '-release' with empty
            new_name=$(echo "$file" | sed -e 's/^app/Lumia/' -e 's/-release//')
            mv "$file" "$new_name"
            echo "Renamed $file to $new_name"
          fi
        done
        if [ -f "Lumia-universal.apk" ]; then
          cp Lumia-universal.apk Lumia.apk
          echo "Copied Lumia-universal.apk to Lumia.apk"
        fi
        echo "Listing reorganized release APKs:"
        ls -la

    - name: Read Release Notes Path
      id: release_notes
      run: |
        if [ -f "RELEASE_NOTES.md" ]; then
          echo "notes_path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"
        else
          # Fallback if file doesn't exist
          echo "notes_path=" >> "$GITHUB_OUTPUT"
        fi

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: ${{ github.event.inputs.release_title }}
        body_path: ${{ steps.release_notes.outputs.notes_path }}
        draft: ${{ github.event.inputs.draft }}
        prerelease: ${{ github.event.inputs.prerelease }}
        files: |
          app/build/outputs/apk/release/Lumia*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
