name: Manual Release Publisher

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as Draft'
        type: boolean
        required: false
        default: false
      prerelease:
        description: 'Publish as Pre-Release'
        type: boolean
        required: false
        default: false

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Resolve Release Variables
      id: vars
      run: |
        echo "Scanning app/app-config.properties..."
        if [ ! -f "app/app-config.properties" ]; then
          echo "ERROR: app/app-config.properties not found!"
          exit 1
        fi
        
        VERSION_NAME=$(grep "VERSION_NAME=" app/app-config.properties | cut -d'=' -f2 | tr -d '\r' | xargs)
        VERSION_CODE=$(grep "VERSION_CODE=" app/app-config.properties | cut -d'=' -f2 | tr -d '\r' | xargs)
        APPLICATION_ID=$(grep "APPLICATION_ID=" app/app-config.properties | cut -d'=' -f2 | tr -d '\r' | xargs)
        
        if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0.0"; fi
        if [ -z "$VERSION_CODE" ]; then VERSION_CODE="1"; fi
        if [ -z "$APPLICATION_ID" ]; then APPLICATION_ID="lumia.tracker"; fi
        
        TAG_NAME="v$VERSION_NAME"
        RELEASE_TITLE="Lumia v$VERSION_NAME (Build $VERSION_CODE)"
        
        IS_DRAFT="${{ github.event.inputs.draft }}"
        IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
        
        # Write variables to environment
        echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
        echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        echo "APPLICATION_ID=$APPLICATION_ID" >> $GITHUB_ENV
        echo "IS_DRAFT=$IS_DRAFT" >> $GITHUB_ENV
        echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV
        
        echo "=========================================="
        echo "Resolved Variable Manifest:"
        echo "  Application ID: $APPLICATION_ID"
        echo "  Version Name:   $VERSION_NAME"
        echo "  Version Code:   $VERSION_CODE"
        echo "  Release Tag:    $TAG_NAME"
        echo "  Release Title:  $RELEASE_TITLE"
        echo "  Is Draft:       $IS_DRAFT"
        echo "  Is Pre-release: $IS_PRERELEASE"
        echo "=========================================="

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Remove invalid macOS Icon files
      run: find app/src/main/res -type f -name "Icon*" -delete

    - name: Setup Signing Key
      run: |
        if [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
          echo "Decoding release keystore from secrets..."
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > my-upload-key.jks
        elif [ -f "debug.keystore.base64" ]; then
          echo "Using persistent debug keystore for consistent signing..."
          base64 --decode debug.keystore.base64 > my-upload-key.jks
        else
          echo "Generating development release keystore..."
          keytool -genkey -v -keystore my-upload-key.jks -storepass android -alias upload -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Lumia Release"
        fi

    - name: Build Release APKs
      run: gradle assembleRelease assembleReleaseCompressed --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" -Dkotlin.compiler.execution.strategy=in-process --no-parallel
      env:
        JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
        STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'android' }}
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'android' }}

    - name: Reorganize and Rename APKs
      run: |
        # Process standard release APKs (Uncompressed)
        cd app/build/outputs/apk/release/
        echo "Listing initial release APKs:"
        ls -la
        for file in *.apk; do
          if [ -f "$file" ]; then
            new_name=$(echo "$file" | sed -e 's/^app/Lumia/' -e 's/-release//')
            mv "$file" "$new_name"
            echo "Renamed $file to $new_name"
          fi
        done
        if [ -f "Lumia-universal.apk" ]; then
          cp Lumia-universal.apk Lumia.apk
          echo "Copied Lumia-universal.apk to Lumia.apk"
        fi
        
        # Process compressed release APKs
        cd ../releaseCompressed/
        echo "Listing initial compressed release APKs:"
        ls -la
        if [ -f "app-releaseCompressed-universal.apk" ]; then
          cp app-releaseCompressed-universal.apk ../release/Lumia-universal-compressed.apk
          echo "Copied universal compressed APK to release folder"
        fi
        
        cd ../release/
        echo "Listing reorganized release APKs:"
        ls -la

    - name: Generate FOSS Verification Checksums & Description
      id: description
      run: |
        echo "Generating professional FOSS release description..."
        
        cat <<EOF > RELEASE_DESCRIPTION.md
        # 📱 Lumia ${{ env.TAG_NAME }} (Build ${{ env.VERSION_CODE }})
        
        Independent open-source build constructed directly from official source code.
        - **Package Name:** \`${{ env.APPLICATION_ID }}\`
        - **Version Name:** \`${{ env.VERSION_NAME }}\`
        - **Version Code:** \`${{ env.VERSION_CODE }}\`
        
        EOF
        
        if [ -f "RELEASE_NOTES.md" ]; then
          echo "Appending user configured RELEASE_NOTES.md..."
          cat RELEASE_NOTES.md >> RELEASE_DESCRIPTION.md
        else
          cat <<EOF >> RELEASE_DESCRIPTION.md
        ## 🌟 What's New
        - Stable release update of Lumia ${{ env.TAG_NAME }}.
        EOF
        fi
        
        echo -e "\n## 🔒 App Security & Integrity Verification (GMS-Free)" >> RELEASE_DESCRIPTION.md
        echo -e "Because Lumia runs completely independent of Google Play Services, you can verify your downloaded APK file's integrity using the SHA-256 hashes below:\n" >> RELEASE_DESCRIPTION.md
        echo -e "| APK Asset Name | SHA-256 Checksum |" >> RELEASE_DESCRIPTION.md
        echo -e "| --- | --- |" >> RELEASE_DESCRIPTION.md
        
        cd app/build/outputs/apk/release/
        touch checksums.sha256
        
        for file in Lumia*.apk; do
          if [ -f "$file" ]; then
            sha=$(sha256sum "$file" | cut -d' ' -f1)
            echo "| $file | \`$sha\` |" >> ../../../../RELEASE_DESCRIPTION.md
            echo "$sha  $file" >> checksums.sha256
          fi
        done
        
        echo "Checksum file generated:"
        cat checksums.sha256
        cd ../../../../
        
        echo "Final RELEASE_DESCRIPTION.md content preview:"
        cat RELEASE_DESCRIPTION.md

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.RELEASE_TITLE }}
        body_path: RELEASE_DESCRIPTION.md
        draft: ${{ env.IS_DRAFT }}
        prerelease: ${{ env.IS_PRERELEASE }}
        files: |
          app/build/outputs/apk/release/Lumia*.apk
          app/build/outputs/apk/release/checksums.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
