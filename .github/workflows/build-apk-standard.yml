name: Build APK (Standard No AOD)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Remove invalid macOS Icon files
      run: find app/src/main/res -type f -name "Icon*" -delete

    - name: Remove True AOD Feature
      run: |
        # Remove SYSTEM_ALERT_WINDOW permission
        sed -i '/android.permission.SYSTEM_ALERT_WINDOW/d' app/src/main/AndroidManifest.xml
        # Remove AodAccessibilityService from AndroidManifest
        perl -0777 -pi -e 's/<service[^>]*AodAccessibilityService.*?<\/service>//gs' app/src/main/AndroidManifest.xml

    - name: Setup Signing Key
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Decoding release keystore from secrets.KEYSTORE_BASE64..."
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks
        elif [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
          echo "Decoding release keystore from secrets.RELEASE_KEYSTORE..."
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > my-upload-key.jks
        else
          echo "ERROR: Release signing keystore secret is missing!"
          echo "Signed APKs are mandatory for this workflow. Build failed."
          exit 1
        fi

    - name: Build Release APKs
      run: gradle assembleRelease assembleReleaseCompressed --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=1024m" -Dkotlin.compiler.execution.strategy=in-process --no-parallel
      env:
        JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
        STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || secrets.RELEASE_KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.RELEASE_KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ALIAS }}

    - name: Reorganize and Rename APKs
      run: |
        # Process standard release APKs (Uncompressed)
        cd app/build/outputs/apk/release/
        echo "Listing initial release APKs:"
        ls -la
        for file in *.apk; do
          if [ -f "$file" ]; then
            new_name=$(echo "$file" | sed -e 's/^app/Lumia/' -e 's/-release//')
            mv "$file" "$new_name"
            echo "Renamed $file to $new_name"
          fi
        done
        if [ -f "Lumia-universal.apk" ]; then
          cp Lumia-universal.apk Lumia.apk
          echo "Copied Lumia-universal.apk to Lumia.apk"
        fi
        
        # Process compressed release APKs
        cd ../releaseCompressed/
        echo "Listing initial compressed release APKs:"
        ls -la
        if [ -f "app-releaseCompressed-universal.apk" ]; then
          cp app-releaseCompressed-universal.apk ../release/Lumia-universal-compressed.apk
          echo "Copied universal compressed APK to release folder"
        fi
        
        cd ../release/
        echo "Listing reorganized release APKs:"
        ls -la

    - name: Upload APKs to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Lumia-Standard-Release-APKs
        path: |
          app/build/outputs/apk/release/Lumia*.apk
